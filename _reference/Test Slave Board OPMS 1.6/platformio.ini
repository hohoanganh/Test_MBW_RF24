; PlatformIO config - OPMS 1.6 Slave Board test firmware
; MCU: STM32F303VCT6 (LQFP100) - xac nhan tu schematic
; Build:   pio run
; Nap:     pio run -t upload      (ST-Link, SWD: PA13/PA14)
; Monitor: pio device monitor     (Console USART1, 115200)

[platformio]
default_envs = opms_slave

[env:opms_slave]
platform  = ststm32
; STM32F303VCT6. Dung board ST co san 'disco_f303vc' (cung MCU) cho chac chan build.
; Cach khac: board = opms_slave (file boards/opms_slave.json) neu core ho tro variant generic.
board     = disco_f303vc
framework = arduino

build_flags =
    -Wall
    -D ADC_BITS=12          ; EmonLib: ADC 12-bit cua STM32 (mac dinh EmonLib la 10-bit)

; Thu vien ngoai:
;  - EmonLib: do dong AC qua bien dong (CT) - driver acmeter (calcIrms).
lib_deps =
    https://github.com/openenergymonitor/EmonLib.git
    stm32duino/STM32duino FreeRTOS@^10.3.1

; RTC self-test tam bo (build nhanh, khong phu thuoc thu vien ngoai).
; Khi can lai: them   lib_deps += stm32duino/STM32duino RTC   va phan rtc trong system.cpp.

; ===== NAP FIRMWARE =====
; openocd (mac dinh cua PlatformIO) khong halt duoc ST-Link clone nay
; ("Unable to reset target"). Nap bang stack rieng cua ST (giong ST-Link Utility),
; che do connect-under-reset (UR) -> on dinh.
upload_protocol = custom
; *** Kiem tra lai duong dan ST-LINK_CLI.exe cho dung may ban (vi du o duoi). ***
upload_command = "C:\Program Files (x86)\STMicroelectronics\STM32 ST-LINK Utility\ST-LINK Utility\ST-LINK_CLI.exe" -c UR -P "$BUILD_DIR\firmware.bin" 0x08000000 -V -Rst -Run

; --- Cach khac: dung STM32CubeProgrammer (neu da cai) ---
; upload_command = "C:\Program Files\STMicroelectronics\STM32Cube\STM32CubeProgrammer\bin\STM32_Programmer_CLI.exe" -c port=SWD mode=UR -w "$BUILD_DIR\firmware.elf" -rst

; --- Cach cu (openocd) - giu lai de tham khao ---
; upload_protocol = stlink
; upload_flags =
;     -c
;     reset_config srst_only srst_nogate connect_assert_srst

monitor_speed = 115200
monitor_echo  = yes
; monitor_port = COM11
