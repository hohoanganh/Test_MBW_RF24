; PlatformIO config - MBW RF24 RS485 2.0 firmware (STM32L151C8T6)
; Build:   pio run
; Nap:     pio run -t upload      (ST-Link, connect-under-reset)
; Monitor: pio device monitor --baud 115200

[platformio]
default_envs = mbw_rf24
; 2026-07-03: build ra ngoai OneDrive - OneDrive khoa/khoi phuc file .o cu
; trong .pio lam linker dung lai object da compile voi cau hinh cu (timers
; bat) du platformio.ini da sua. Thu muc .pio cu trong project co the xoa tay.
workspace_dir = C:\pio_ws\mbw_rf24

[env:mbw_rf24]
platform  = ststm32
; Board tu dinh nghia trong boards/genericSTM32L151C8.json (STM32L151C8T6, 64K Flash/10K RAM)
board     = genericSTM32L151C8
framework = arduino

build_flags =
    -Wall
    -D MBW_FW
    ; 2026-07-03 BAT BUOC: de thu vien STM32duino FreeRTOS (timers.c/tasks.c/
    ; heap.c...) nhin thay src/STM32FreeRTOSConfig.h khi compile - file config
    ; FreeRTOS RIENG cua project, thay the FreeRTOSConfig_Default.h. Ly do:
    ; default header dinh nghia configUSE_TIMERS=1 KHONG co #ifndef nen cac
    ; flag -D configUSE_TIMERS=0 / configUSE_TRACE_FACILITY=0 o duoi BI GHI DE
    ; nguoc (chi con tac dung voi file KHONG dung config default - giu lai de
    ; nhat quan). Xem ghi chu dau src/STM32FreeRTOSConfig.h.
    -I src

    ; ===== FreeRTOS: RAM budget cho STM32L151C8T6 (CHI 10KB RAM!) =====
    ; 2026-07-03 XAC MINH: thu vien "stm32duino/STM32duino FreeRTOS" ban nay
    ; MAC DINH dung allocator heap_useNewlib_ST.c (route qua newlib malloc/
    ; sbrk), KHONG PHAI heap_4.c kieu mang tinh ucHeap[configTOTAL_HEAP_SIZE].
    ; -> Macro configTOTAL_HEAP_SIZE o duoi day KHONG duoc allocator dang dung
    ; doc toi, sua no KHONG co tac dung gi (da kiem chung tren board that: doi
    ; 4KB -> 6KB, free heap luc runtime khong doi mot byte). Muon dung macro
    ; nay that su phai ep chon "-D configMEMMANG_HEAP_NB=4" (heap_4.c) - NHUNG
    ; heap.c cua thu vien lai HARD-CODE configTOTAL_HEAP_SIZE=15*1024 bat cu
    ; khi nao configMEMMANG_HEAP_NB != -1 (khong quan tam gia tri build_flags),
    ; 15KB > 10KB RAM chip nay -> se FAIL link. Vi vay KHONG chuyen sang heap_4.
    ;
    ; Rui ro RAM that su voi newlib-heap allocator: xem ghi chu dau file
    ; src/rtos_glue.h (RTOS_STACK_xxx) - truoc vTaskStartScheduler(), gioi han
    ; cap phat la CON TRO STACK HIEN TAI luc goi ham (tac gia thu vien tu ghi
    ; "risky!" trong heap_useNewlib_ST.c), khong phai 1 ngan RAM co dinh. Cach
    ; giam rui ro thuc te: GIAM RTOS_STACK_xxx (rtos_glue.h) va tranh chen them
    ; lenh in/goi ham xen giua cac lan xTaskCreate() trong setup() (main.cpp).
    -D configTOTAL_HEAP_SIZE="((size_t)(6*1024))" ; giu lai vo hai, hien khong co tac dung - xem ghi chu tren

    ; 2026-07-03: chuyen 3 task + 2 queue + 2 mutex sang CAP PHAT TINH
    ; (xTaskCreateStatic/xQueueCreateStatic/xSemaphoreCreateMutexStatic - xem
    ; rtos_glue.cpp/main.cpp) de LOAI BO HOAN TOAN phu thuoc vao newlib malloc
    ; "risky" luc setup() (xem ghi chu tren + heap_useNewlib_ST.c). Buffer tinh
    ; nam trong .bss, RAM duoc linker tinh CHINH XAC luc build - neu khong du,
    ; BUILD SE BAO LOI RO RANG (region RAM overflowed) thay vi treo may im
    ; lang nhu truoc day. Macro nay BAT BUOC phai bat (mac dinh thu vien TAT
    ; cho duong dan khong dung CMSIS-RTOSv2, xem FreeRTOSConfig_Default.h).
    -D configSUPPORT_STATIC_ALLOCATION=1
    ; Tat Timer service task (khong dung xTimer trong firmware nay) - tiet
    ; kiem ~600-800 byte RAM (stack + TCB + queue cua timer task).
    -D configUSE_TIMERS=0
    ; Tat cac tinh nang khong dung de giam code/RAM overhead cua kernel.
    -D configUSE_TRACE_FACILITY=0
    -D configGENERATE_RUN_TIME_STATS=0
    -D configUSE_CO_ROUTINES=0
    ; Bat ham do stack con lai (uxTaskGetStackHighWaterMark) - dung trong
    ; "rtos stat" de kiem tra xem stack moi task da du du chua tren board that.
    -D INCLUDE_uxTaskGetStackHighWaterMark=1
    -D INCLUDE_xTaskGetIdleTaskHandle=1

; Thu vien RF: dung RF24 (nRF24 team, ke thua tu TMRh20) - da toi uu ARQ/CRC/
; ShockBurst cho lien ket khong day, thay vi tu viet driver SPI thap cap cho
; nRF24L01 (giam rui ro bug, tang tin cay duong truyen trong moi truong nhieu
; cong nghiep).
; LUU Y: du an RF24 tren GitHub da chuyen tu tai khoan ca nhan "tmrh20" sang to
; chuc "nRF24"; PlatformIO Registry cung dung ten owner moi la "nrf24" (khong
; con "tmrh20"). Dung "tmrh20/RF24" se bao loi UnknownPackageError.
;
; STM32duino FreeRTOS: chuyen kien truc firmware tu setup()/loop() don khoi
; sang 3 task RTOS (RS485/Bridge, RF, CLI+peripherals) de "song song hoa that"
; RF/RS485/CLI thay vi xu ly tuan tu trong 1 vong loop() - xem src/rtos_glue.*
lib_deps =
    nrf24/RF24 @ ^1.4.9
    stm32duino/STM32duino FreeRTOS @ ^10.3.1

upload_protocol = stlink
monitor_speed = 115200
monitor_echo  = yes
monitor_port = COM33
