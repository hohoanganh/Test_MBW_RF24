<svg viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sơ đồ NET_ID, DEV_ID và cơ chế poll không cần địa chỉ RF</title>
<desc>3 khối định danh độc lập: NET_ID chọn pipe (CLI+Flash), DEV_ID định danh RF từng board (DIP switch, độc lập với Modbus), địa chỉ Modbus nằm trong payload quyết định thiết bị nào trả lời. Sơ đồ luồng cho thấy hub broadcast không cần địa chỉ đích, mọi bridge đều nhận và forward xuyên suốt, chỉ đúng thiết bị Modbus khớp địa chỉ mới trả lời.</desc>
<defs>
  <marker id="aGrey" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/></marker>
  <marker id="aBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker>
  <marker id="aGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/></marker>
  <marker id="aDark" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#334155"/></marker>
</defs>
<rect x="0" y="0" width="1100" height="900" fill="#ffffff"/>

<!-- ===== LEGEND ROW: 3 độc lập ===== -->
<text x="550" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">3 con số ĐỘC LẬP — không con nào phụ thuộc con nào</text>

<!-- NET_ID -->
<rect x="30" y="45" width="330" height="175" rx="12" fill="#eff6ff" stroke="#1e3a5f" stroke-width="2"/>
<text x="195" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a5f">NET_ID (0-63)</text>
<text x="50" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Cấu hình:</text>
<text x="50" y="115" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">CLI + lưu Flash (không qua DIP)</text>
<text x="50" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Vai trò:</text>
<text x="50" y="157" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">Chọn địa chỉ Pipe RF</text>
<text x="50" y="174" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">CÙNG 1 giá trị cho cả deployment</text>
<text x="50" y="191" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">(hub + mọi slave giống nhau)</text>
<text x="50" y="210" font-family="Arial, sans-serif" font-size="11" fill="#1d4ed8" font-style="italic">→ cách ly nhiều lắp đặt khác nhau</text>

<!-- DEV_ID -->
<rect x="385" y="45" width="330" height="175" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="550" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">DEV_ID (0-63)</text>
<text x="405" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Cấu hình:</text>
<text x="405" y="115" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">DIP switch 6-bit riêng từng board</text>
<text x="405" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Vai trò:</text>
<text x="405" y="157" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">Định danh RF của board (dedup,</text>
<text x="405" y="174" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">heartbeat/link-up) — KHÔNG dùng</text>
<text x="405" y="191" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">để lọc/định tuyến poll</text>
<text x="405" y="210" font-family="Arial, sans-serif" font-size="11" fill="#b45309" font-style="italic">→ độc lập hoàn toàn với địa chỉ Modbus</text>

<!-- Modbus address -->
<rect x="740" y="45" width="330" height="175" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="905" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">Địa chỉ Slave Modbus (1-247)</text>
<text x="760" y="98" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Cấu hình:</text>
<text x="760" y="115" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">Trên chính thiết bị Modbus slave thật</text>
<text x="760" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Vai trò:</text>
<text x="760" y="157" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">Nằm TRONG payload — quyết định</text>
<text x="760" y="174" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">thiết bị nào trả lời. Bridge chỉ</text>
<text x="760" y="191" font-family="Arial, sans-serif" font-size="11.5" fill="#334155">forward xuyên suốt, không đọc</text>
<text x="760" y="210" font-family="Arial, sans-serif" font-size="11" fill="#15803d" font-style="italic">→ ngoài phạm vi board bridge</text>

<!-- ===== FLOW TITLE ===== -->
<text x="550" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Luồng Poll — RF broadcast không cần địa chỉ đích</text>

<!-- Hub -->
<rect x="470" y="270" width="180" height="62" rx="8" fill="#1e3a5f"/>
<text x="560" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">HUB (Master)</text>
<text x="560" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">NET_ID=5, dev_id=0 (DIP để mặc định = Hub)</text>
<text x="560" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">poll: "Modbus addr=22, đọc thanh ghi..."</text>

<!-- broadcast arrows to 3 stacks -->
<line x1="500" y1="332" x2="185" y2="418" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aGrey)"/>
<line x1="560" y1="332" x2="555" y2="418" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aGrey)"/>
<line x1="620" y1="332" x2="925" y2="418" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aGrey)"/>
<text x="560" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#64748b" font-style="italic">broadcast: forward cho TẤT CẢ, không lọc theo dev_id</text>

<!-- ===== Stack A ===== -->
<g>
  <rect x="90" y="420" width="190" height="55" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <text x="185" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">Bridge A</text>
  <text x="185" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">dev_id = 3</text>

  <line x1="185" y1="475" x2="185" y2="520" stroke="#334155" stroke-width="1.6" marker-end="url(#aDark)"/>
  <text x="230" y="502" font-family="Arial, sans-serif" font-size="10.5" fill="#64748b">RS485 nội bộ</text>

  <rect x="90" y="522" width="190" height="55" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="185" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#475569">Slave Modbus</text>
  <text x="185" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">addr = 15</text>

  <text x="185" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">✕ im lặng (sai địa chỉ)</text>
</g>

<!-- ===== Stack B (match) ===== -->
<g>
  <rect x="460" y="420" width="190" height="55" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <text x="555" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">Bridge B</text>
  <text x="555" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">dev_id = 7</text>

  <line x1="540" y1="475" x2="540" y2="520" stroke="#334155" stroke-width="1.6" marker-end="url(#aDark)"/>
  <text x="585" y="502" font-family="Arial, sans-serif" font-size="10.5" fill="#64748b">RS485 nội bộ</text>

  <rect x="460" y="522" width="190" height="55" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <text x="555" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#14532d">Slave Modbus ✓</text>
  <text x="555" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">addr = 22 (khớp)</text>

  <line x1="570" y1="522" x2="570" y2="480" stroke="#16a34a" stroke-width="2" marker-end="url(#aGreen)"/>
</g>

<!-- ===== Stack C ===== -->
<g>
  <rect x="830" y="420" width="190" height="55" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <text x="925" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">Bridge C</text>
  <text x="925" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">dev_id = 12</text>

  <line x1="925" y1="475" x2="925" y2="520" stroke="#334155" stroke-width="1.6" marker-end="url(#aDark)"/>
  <text x="970" y="502" font-family="Arial, sans-serif" font-size="10.5" fill="#64748b">RS485 nội bộ</text>

  <rect x="830" y="522" width="190" height="55" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="925" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#475569">Slave Modbus</text>
  <text x="925" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">addr = 8</text>

  <text x="925" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">✕ im lặng (sai địa chỉ)</text>
</g>

<!-- response path back to hub -->
<path d="M 590,420 C 610,370 580,340 610,330" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="700" y="400" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#16a34a">response qua RF (broadcast,</text>
<text x="700" y="416" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#16a34a">tag dev_id=7) → chỉ Hub xử lý</text>

<!-- callout box -->
<rect x="90" y="640" width="930" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3"/>
<text x="555" y="668" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">dev_id = 7 (Bridge B) và địa chỉ Modbus = 22 (thiết bị thật) là 2 CON SỐ ĐỘC LẬP</text>
<text x="555" y="692" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">Bridge KHÔNG đọc, KHÔNG lọc theo địa chỉ Modbus trong payload — chỉ forward xuyên suốt cả 2 chiều.</text>
<text x="555" y="712" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">dev_id chỉ dùng NỘI BỘ ở tầng RF (dedup theo seq, heartbeat/link-up từng board) — không liên quan gì đến</text>
<text x="555" y="732" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">việc "ai trả lời" — việc đó do chính thiết bị Modbus slave tự quyết định khi so khớp địa chỉ trong payload.</text>

<rect x="90" y="770" width="930" height="55" rx="10" fill="#f1f5f9"/>
<text x="555" y="793" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">Xám nét đứt = broadcast vật lý (mọi board đều nhận, không cần địa chỉ RF đích)　|　Đen = forward RS485 nội bộ　|　Xanh lá = response thật (chỉ 1 board có)</text>
<text x="555" y="811" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155">Amber = Bridge (định danh bằng dev_id, DIP switch)　|　Xám/Xanh lá nhạt = thiết bị Modbus slave thật (định danh bằng địa chỉ Modbus)</text>

</svg>
